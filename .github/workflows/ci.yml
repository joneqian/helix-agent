name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.9.26"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check

      - name: ruff format check
        run: uv run ruff format --check

      - name: metric naming lint (subsystems/20 § 5.2)
        run: uv run python tools/observability/check_metric_names.py

      - name: RLS naming lint (STREAM-C-DESIGN § 2.4)
        run: uv run python tools/persistence/check_rls_naming.py

      - name: audit-write path lint (STREAM-D-DESIGN § 6)
        run: uv run python tools/persistence/check_audit_insert_path.py

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: mypy strict
        run: uv run mypy packages

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    # Unit-only path; ``integration`` marker (testcontainers Postgres /
    # MinIO / pgbouncer compose) runs in the separate ``test-integration``
    # job so a slow Docker image pull on the runner never gates the PR.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Run pytest (unit)
        run: uv run pytest -v -m "not integration"

  test-integration:
    name: Test (integration)
    runs-on: ubuntu-latest
    # Image pulls on shared runners are bursty; budget 25 min and allow
    # this job to fail without gating the PR (until self-hosted runners
    # with warm Docker caches land).
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Run pytest (integration)
        run: uv run pytest -v -m integration

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Export non-workspace deps
        run: uv export --frozen --no-emit-workspace --no-hashes --format=requirements.txt > requirements-audit.txt

      - name: pip-audit
        run: uvx pip-audit -r requirements-audit.txt --strict --disable-pip --no-deps

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure
