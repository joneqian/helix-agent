name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.9.26"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check

      - name: ruff format check
        run: uv run ruff format --check

      - name: metric naming lint (subsystems/20 § 5.2)
        run: uv run python tools/observability/check_metric_names.py

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: mypy strict
        run: uv run mypy packages

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest -v

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Export non-workspace deps
        run: uv export --frozen --no-emit-workspace --no-hashes --format=requirements.txt > requirements-audit.txt

      - name: pip-audit
        run: uvx pip-audit -r requirements-audit.txt --strict --disable-pip --no-deps

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure
