name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.9.26"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check

      - name: ruff format check
        run: uv run ruff format --check

      - name: metric naming lint (subsystems/20 § 5.2)
        run: uv run python tools/observability/check_metric_names.py

      - name: RLS naming lint (STREAM-C-DESIGN § 2.4)
        run: uv run python tools/persistence/check_rls_naming.py

      - name: audit-write path lint (STREAM-D-DESIGN § 6)
        run: uv run python tools/persistence/check_audit_insert_path.py

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: mypy strict
        run: uv run mypy packages services/audit-backup-worker/src services/billing-rollup-job/src services/event-log-archive-job/src services/orchestrator/src services/retention-cleanup-job/src

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    # Unit-only path; ``integration`` marker (testcontainers Postgres /
    # MinIO / pgbouncer compose) runs in the separate ``test-integration``
    # job so a slow Docker image pull on the runner never gates the PR.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Run pytest (unit)
        # --timeout: a hung test (e.g. uvicorn SSE shutdown) fails fast + names
        # itself instead of hanging the job until the 10-min cancel.
        run: uv run pytest -v -m "not integration" --timeout=120 --timeout-method=thread

  test-integration:
    name: Test (integration)
    runs-on: ubuntu-latest
    # Image pulls on shared runners are bursty; budget 25 min and allow
    # this job to fail without gating the PR (until self-hosted runners
    # with warm Docker caches land).
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Run pytest (integration)
        run: uv run pytest -v -m integration

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Export non-workspace deps
        run: uv export --frozen --no-emit-workspace --no-hashes --format=requirements.txt > requirements-audit.txt

      - name: pip-audit
        # PYSEC-2025-183 — published 2026-05-20 against pyjwt 2.12.1 (the
        # latest available release on PyPI). No fix version is shipped
        # upstream yet; ignore until pyjwt cuts a patched release.
        # Track: https://github.com/jpadilla/pyjwt/security/advisories
        # (re-evaluate when ``uvx pip index versions pyjwt`` shows >2.12.1).
        run: |
          uvx pip-audit -r requirements-audit.txt --strict --disable-pip \
            --no-deps --ignore-vuln PYSEC-2025-183

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure
