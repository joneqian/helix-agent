name: Admin UI CI

# Stream H CI infrastructure — typecheck + test + build the production
# ``apps/admin-ui/`` workspace. The visual-baseline sandbox
# (apps/admin-ui-demo) was removed after H.1b PR 2b, since admin-ui
# itself is the production baseline.

on:
  push:
    branches: [main]
    paths:
      - "apps/admin-ui/**"
      - ".github/workflows/admin-ui-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/admin-ui/**"
      - ".github/workflows/admin-ui-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  admin-ui:
    name: admin-ui (typecheck + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/admin-ui
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/admin-ui/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (vitest)
        run: pnpm test

      - name: Build (vite)
        run: pnpm build
