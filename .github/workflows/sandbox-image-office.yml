name: Sandbox Image (office)

# Builds the "office" sandbox variant (infra/sandbox-image-office) — slim +
# office libs + CJK fonts/locale (Stream OFFICE-1b). On PRs it only builds &
# smoke-tests (no registry creds needed); on main / manual dispatch it also
# pushes to Aliyun ACR.
#
# Registry wiring (set in repo Settings → Secrets and variables → Actions):
#   vars.ALIYUN_ACR_REGISTRY    e.g. registry.cn-hangzhou.aliyuncs.com
#   vars.ALIYUN_ACR_NAMESPACE   your ACR namespace
#   secrets.ALIYUN_ACR_USERNAME
#   secrets.ALIYUN_ACR_PASSWORD
# Then point the supervisor at the pushed image:
#   HELIX_SANDBOX_SANDBOX_IMAGE_OFFICE=<registry>/<namespace>/helix-sandbox-office:latest

on:
  push:
    branches: [main]
    paths:
      - "infra/sandbox-image-office/**"
      - "infra/sandbox-image/runner.py" # shared, baked into the office image
      - ".trivyignore"
      - ".github/workflows/sandbox-image-office.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/sandbox-image-office/**"
      - "infra/sandbox-image/runner.py"
      - ".trivyignore"
      - ".github/workflows/sandbox-image-office.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: this job builds an attacker-controllable Dockerfile on PRs.
# security-events:write lets the Trivy SARIF land in the Security tab; the
# registry login uses secrets.* directly, not GITHUB_TOKEN.
permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build + smoke (+ multi-arch push on main)
    runs-on: ubuntu-latest
    # LibreOffice + ffmpeg + poppler (route ① §5.4) add a large apt layer; a
    # cold build (cache miss) downloads ~1 GB of debs. The multi-arch push also
    # cross-builds linux/arm64 under QEMU emulation (slow for this heavy base),
    # so allow generous headroom; the gha cache warms it after the first push.
    timeout-minutes: 90
    steps:
      # Actions are SHA-pinned (a mutable tag could be re-pointed at malicious
      # code in this credential-holding workflow); the trailing comment tracks
      # the human-readable version. These majors also run on Node 24 (the
      # Node 20 actions runtime is removed from runners 2026-09).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # QEMU lets the amd64 runner cross-build linux/arm64 for the multi-arch
      # push (Apple-silicon dev machines pull arm64). Only the push step is
      # multi-arch — the local-load build below stays native amd64 (docker load
      # can't ingest a multi-platform image; smoke/Trivy gate on the native arch).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Build once into the local daemon so the smoke test can `docker run` it.
      # Build context is infra/ (the office Dockerfile COPYs the shared
      # sandbox-image/runner.py).
      - name: Build (load local)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: infra
          file: infra/sandbox-image-office/Dockerfile
          load: true
          tags: helix-sandbox-office:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (office libs + CJK)
        run: python infra/sandbox-image-office/smoke_test.py helix-sandbox-office:ci

      # Two Trivy steps (see sandbox-image.yml for why a single sarif+exit-code
      # step gates on all severities): report (sarif, all severities, exit 0)
      # then gate (table, severity floor, exit 1).
      #
      # The gate is CRITICAL-only (not CRITICAL,HIGH like the minimal image):
      # the LibreOffice + CJK Debian base carries a large user-space library
      # surface that keeps a HIGH count perpetually red and would defeat the
      # gate (design HX-K5). The sandbox's real isolation boundary is gVisor,
      # so user-space-lib CVEs here are defense-in-depth; HIGH is still tracked
      # by the SARIF report above + the weekly full scan. --ignore-unfixed →
      # only actionable CVEs block.
      - name: Trivy report (SARIF, all severities)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: helix-sandbox-office:ci
          format: sarif
          output: trivy-office.sarif
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-office.sarif
          category: trivy-sandbox-office

      - name: Trivy gate (CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: helix-sandbox-office:ci
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "1"
          skip-db-update: true # report step above already fetched the DB

      # ---- push (main / manual only, and only when the registry is configured)
      - name: Log in to Aliyun ACR
        if: github.event_name != 'pull_request' && vars.ALIYUN_ACR_REGISTRY != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ vars.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build + push to ACR (multi-arch)
        if: github.event_name != 'pull_request' && vars.ALIYUN_ACR_REGISTRY != ''
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: infra
          file: infra/sandbox-image-office/Dockerfile
          push: true
          # amd64 (Linux prod hosts) + arm64 (Apple-silicon dev). No arch pins
          # in the Dockerfile — apt/pip resolve per-arch — so one build yields a
          # manifest list covering both.
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ vars.ALIYUN_ACR_REGISTRY }}/${{ vars.ALIYUN_ACR_NAMESPACE }}/helix-sandbox-office:${{ github.sha }}
            ${{ vars.ALIYUN_ACR_REGISTRY }}/${{ vars.ALIYUN_ACR_NAMESPACE }}/helix-sandbox-office:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
