# Helix-Agent staging environment config (Phase 0.3 placeholder).
# Endpoints become real once 阿里云 ECS / RDS / KMS / OSS / ACR are provisioned
# (per docs/decisions/phase-0-launch.md decision 2 & 3, Linux server申请进行中).

environment: staging

# Database — 阿里云 RDS PostgreSQL staging
database:
  host: TBD-rds-staging.aliyuncs.com
  port: 5432
  name: helix_agent_staging
  user: helix_agent
  # password injected via env var HELIX_AGENT_DB_PASSWORD

# Object storage — 阿里云 OSS staging bucket (ADR-0004)
object_storage:
  backend: aliyun-oss
  endpoint: TBD-oss-staging
  region: cn-hangzhou
  bucket: helix-agent-staging
  use_path_style: false

# Secret store — TBD per ADR-0007 (Vault self-hosted vs 阿里云 KMS Secrets Manager)
secrets:
  backend: tbd

# Observability — self-hosted stack on staging cluster
observability:
  langfuse:
    host: TBD-langfuse-staging
  prometheus:
    host: TBD-prometheus-staging
  tempo:
    host: TBD-tempo-staging
  grafana:
    host: TBD-grafana-staging

# Auth — self-hosted Keycloak (ADR-0003)
auth:
  oidc:
    issuer: TBD-keycloak-staging/realms/helix-agent

# Container registry — 阿里云 ACR staging
container_registry:
  type: aliyun-acr
  endpoint: TBD-acr-staging.cn-hangzhou.cr.aliyuncs.com
  namespace: helix-agent
