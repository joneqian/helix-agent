# Helix login theme — Stream ACCT (白标 Keycloak,用户看不出背后是 Keycloak)。
#
# 继承官方 ``keycloak`` 主题,仅叠加一层品牌 CSS(深色 + cyan/violet,对齐
# admin-ui 设计基线)。不重写 FreeMarker 模板 —— 升级 Keycloak 不易碎。
#
# ``styles`` 会整体覆盖父主题的列表,所以这里显式带上父主题的
# ``css/login.css``(按主题继承链解析到父文件)再追加 ``css/helix.css``(本主题)。
parent=keycloak
import=common/keycloak

styles=css/login.css css/helix.css
