# OpenTelemetry Collector config — Stream G.0.
#
# Receives OTLP from the helix services (A.8 OTel SDK) and forwards
# traces to Tempo. Metrics are scraped by Prometheus directly off the
# services' /metrics endpoints, so the collector handles traces only;
# logs reach Loki via Promtail.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
