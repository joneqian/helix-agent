# Grafana dashboard provider — Stream G.0.
#
# Loads dashboard JSON from /var/lib/grafana/dashboards (mounted from
# tools/observability/dashboards/). Empty until G.7 adds the first three.

apiVersion: 1

providers:
  - name: helix
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
