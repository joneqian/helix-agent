# Grafana datasource provisioning — Stream G.0.
#
# Wires the three observability backends as datasources on first boot
# so the G.7 dashboards have data sources to bind to.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
