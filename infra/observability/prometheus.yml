# Prometheus scrape + rule config — Stream G.0.
#
# Scrapes the helix services' /metrics endpoints (A.9 metric registry).
# Alert + recording rules land in /etc/prometheus/rules (mounted from
# tools/observability/rules/) — empty until G.1 / G.2 fill them.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Only the control-plane exposes /metrics in M0 (A.9 — control_plane
  # api/metrics.py). sandbox-supervisor / credential-proxy gain it later.
  - job_name: helix-control-plane
    metrics_path: /metrics
    static_configs:
      - targets: ["control-plane:8000"]
