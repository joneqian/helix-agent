# Prometheus scrape + rule config — Stream G.0.
#
# Scrapes the helix services' /metrics endpoints (A.9 metric registry).
# Alert + recording rules land in /etc/prometheus/rules (mounted from
# tools/observability/rules/) — empty until G.1 / G.2 fill them.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # The control-plane exposes /metrics (A.9 — control_plane api/metrics.py).
  # The orchestrator runs in-process inside the control-plane, so its metrics
  # (helix_session_ttft_seconds / _duration_seconds / helix_durable_resume_* /
  # helix_llm_stream_stale_total) register to the same shared registry and are
  # scraped here — there is no separate orchestrator scrape target.
  - job_name: helix-control-plane
    metrics_path: /metrics
    static_configs:
      - targets: ["control-plane:8000"]

  # Stream P (Mini-ADR P-15) — the sandbox-supervisor is a standalone service;
  # scrape its own /metrics for helix_sandbox_cold_start_seconds (Phase 6 SLO).
  - job_name: helix-sandbox-supervisor
    metrics_path: /metrics
    static_configs:
      - targets: ["sandbox-supervisor:8000"]
