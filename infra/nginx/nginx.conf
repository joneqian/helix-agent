# Helix-Agent dev reverse proxy with mTLS termination — Stream C.2.
#
# Listens on 8443 (HTTPS w/ client cert required) and forwards to the
# control plane (HTTP) with an Envoy-format ``X-Forwarded-Client-Cert``
# header. Mirrors the production Istio sidecar behaviour so the auth
# middleware path stays identical between dev and prod.
#
# Certificates are generated by ``tools/dev-certs/generate.py`` and
# mounted into ``/etc/nginx/certs`` via docker-compose. The CA and the
# server cert/key are dev-only — regenerate before sharing logs.

events {}

http {
    log_format helix '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_user_agent" peer_cn="$ssl_client_s_dn"';
    access_log /var/log/nginx/access.log helix;

    # Blue/green upstream for control-plane (Stream I.2). The
    # ``control_plane_upstream`` block is defined in the include file
    # below — tools/deploy/deploy.py rewrites it to flip the live
    # colour, then ``nginx -s reload`` re-reads it.
    include /etc/nginx/conf.d/*.conf;

    # Plain HTTP listener for /healthz; bypasses mTLS so k8s liveness /
    # docker-compose healthchecks don't need certs.
    server {
        listen 8080;
        server_name _;

        location /healthz/ {
            proxy_pass http://control_plane_upstream;
            proxy_set_header Host $host;
        }

        location = /metrics {
            proxy_pass http://control_plane_upstream;
            proxy_set_header Host $host;
        }
    }

    # mTLS listener for internal service-to-service traffic.
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client      on;
        ssl_verify_depth       2;

        # Reject unauthenticated requests early.
        if ($ssl_client_verify != SUCCESS) {
            return 401;
        }

        location / {
            proxy_pass http://control_plane_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Envoy-format XFCC. Subject DN is quoted so commas inside
            # the DN don't trip the parser; the hash is the SHA-256
            # fingerprint of the peer cert.
            proxy_set_header X-Forwarded-Client-Cert
                "Subject=\"$ssl_client_s_dn\";Hash=$ssl_client_fingerprint";
        }
    }
}
