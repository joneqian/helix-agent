# Helix-Agent local dev / dogfood stack (Stream A.3).
#
# Brings up Postgres 16 with pgvector + pg_stat_statements behind PgBouncer
# in transaction-pooling mode (per subsystems/23-postgres-scalability § 9 M0).
#
# Usage:
#   cd infra && docker compose up -d
#   # Application connects via PgBouncer on localhost:6432
#   # Direct Postgres access (migrations, psql) on localhost:5432
#
# Credentials are placeholders. Override via .env or your secret store.

# Shared config for the blue/green control-plane pair (Stream I.2 /
# STREAM-I-DESIGN § 6). Both colours run under the ``full`` profile;
# tools/deploy/deploy.py recreates the idle colour with a new image tag
# and flips the nginx upstream (infra/nginx/conf.d/control-plane-upstream.conf).
x-control-plane-base: &control-plane-base
  profiles: ["full"]
  image: helix-control-plane:${HELIX_CONTROL_PLANE_TAG:-dev}
  environment:
    HELIX_AGENT_DB_DSN: postgresql+asyncpg://${HELIX_DB_USER:-helix_agent}:${HELIX_DB_PASSWORD:-helix_agent_dev}@pgbouncer:6432/${HELIX_DB_NAME:-helix_agent_dev}
    # ADR B-6: durable Postgres stores. The ``migrate`` one-shot service
    # runs the Alembic migrations first (depends_on below).
    HELIX_AGENT_STORE_BACKEND: sql
    HELIX_AGENT_QUOTA_REDIS_URL: redis://redis:6379/0
    HELIX_AGENT_SANDBOX_SUPERVISOR_URL: http://sandbox-supervisor:8000
    # Trace export (A.8) — reached only when the observability profile
    # is also up; the SDK buffers + drops gracefully when it is not.
    HELIX_AGENT_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    # Stream P (Mini-ADR P-13) — local_dev SecretStore seed. Resolves the
    # canonical agent's `secret://helix-agent/dev/llm/...` api_key_ref to the
    # real key a dev pastes into infra/dev-keys/dev-llm-keys.local (git-
    # ignored). Missing file → empty store → agent build fails loud only when
    # a key is actually requested. See infra/dev-keys/dev-llm-keys.example.
    HELIX_AGENT_SECRET_STORE_ENV_FILE: /run/dev-keys/dev-llm-keys.local
    # Stream Q — encrypted-vault backend. Default keeps the file-backed local_dev
    # store; set these to paste keys in the web UI (encrypted at rest). The KEK
    # is env-passthrough (never committed): export a 32-byte base64 key locally.
    HELIX_AGENT_SECRET_STORE_BACKEND: ${HELIX_AGENT_SECRET_STORE_BACKEND:-local_dev}
    HELIX_AGENT_SECRET_ENCRYPTION_KEY: ${HELIX_AGENT_SECRET_ENCRYPTION_KEY:-}
    # Stream R W4 — member onboarding via the live Keycloak Admin API. Default
    # OFF so the `full`-only stack (and CI integration without the `auth`
    # profile) keeps the in-process fake client. Set true in infra/.env to
    # provision real accounts; the admin client secret is NOT passed here — it
    # is loaded from the encrypted vault, seeded once via
    # `python -m control_plane.seed_keycloak_secret`. See getting-started.md.
    HELIX_AGENT_KEYCLOAK_ENABLED: ${HELIX_AGENT_KEYCLOAK_ENABLED:-false}
  volumes:
    # The directory always exists (committed .example); the .local inside it
    # is git-ignored, so this bind mount never breaks `up` when a dev hasn't
    # created their key file yet.
    - ./dev-keys:/run/dev-keys:ro
  depends_on:
    pgbouncer:
      condition: service_healthy
    redis:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  healthcheck:
    # Real HTTP liveness — a bare TCP connect passes before uvicorn
    # finishes lifespan startup, which makes ``up --wait`` (and the
    # nginx upstream) race the app. /healthz/live is 200 only once the
    # app is actually serving.
    test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/live', timeout=2)\""]
    interval: 3s
    timeout: 3s
    retries: 20

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: helix-postgres
    environment:
      POSTGRES_USER: ${HELIX_DB_USER:-helix_agent}
      POSTGRES_PASSWORD: ${HELIX_DB_PASSWORD:-helix_agent_dev}
      POSTGRES_DB: ${HELIX_DB_NAME:-helix_agent_dev}
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=top"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_line_prefix=%t [%p] %q%u@%d "
      - "-c"
      - "max_connections=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HELIX_DB_USER:-helix_agent} -d ${HELIX_DB_NAME:-helix_agent_dev}"]
      interval: 2s
      timeout: 3s
      retries: 15

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: helix-pgbouncer
    environment:
      # edoburu/pgbouncer generates pgbouncer.ini from these env vars.
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${HELIX_DB_USER:-helix_agent}
      DB_PASSWORD: ${HELIX_DB_PASSWORD:-helix_agent_dev}
      DB_NAME: ${HELIX_DB_NAME:-helix_agent_dev}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "50"
      RESERVE_POOL_SIZE: "10"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_RESET_QUERY: DISCARD ALL
      # Required for transaction-mode + prepared statements (PgBouncer >= 1.21).
      MAX_PREPARED_STATEMENTS: "100"
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: "6432"
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # edoburu/pgbouncer is alpine-based and doesn't ship pg_isready; use
      # busybox nc to verify the listener is up.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6432 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    # Redis 7 — quota / rate-limit engine backing store (Stream C.5).
    # AOF persistence with everysec fsync keeps a 1s RPO without the
    # latency of always; 512 MB maxmemory matches subsystems/16 § 3.2.
    # ``allkeys-lru`` keeps the hottest tenant buckets when memory is
    # tight; budget keys are short-lived (per month) so eviction is a
    # non-issue.
    image: redis:7-alpine
    container_name: helix-redis
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 2s
      timeout: 2s
      retries: 20

  minio:
    # MinIO S3-compatible object storage (Stream A.5 / ADR-0004).
    # Local dev stand-in for Aliyun OSS — same protocol, zero code changes
    # between environments.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: helix-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${HELIX_MINIO_ROOT_USER:-helix_agent}
      MINIO_ROOT_PASSWORD: ${HELIX_MINIO_ROOT_PASSWORD:-helix_agent_dev_minio}
      # D.4 SSE-KMS. Set ``HELIX_MINIO_KMS_SECRET_KEY`` (format:
      # ``key-name:base64-32-byte-key``) to activate MinIO's inline
      # KMS provider — bucket-level SSE-KMS works without spinning
      # up KES. Empty / unset → encryption off (default dev path).
      # See [ADR-0008](../docs/adr/0008-data-at-rest-encryption.md)
      # for the prod path (OSS SSE-KMS via Aliyun KMS).
      MINIO_KMS_SECRET_KEY: ${HELIX_MINIO_KMS_SECRET_KEY:-}
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15

  nginx:
    # Reverse-proxy with mTLS termination — Stream C.2.
    # Forwards Envoy-format ``X-Forwarded-Client-Cert`` to the control
    # plane so :class:`AuthMiddleware` can authenticate the peer.
    # Certificates come from ``./dev-certs/`` (generated by
    # ``tools/dev-certs/generate.py`` — gitignored). Until you run that
    # script, omit this service from ``docker compose up``.
    #
    # Behind the ``proxy`` compose profile so the default ``up`` (used
    # by data-layer integration tests) doesn't bind host port 8080.
    # Enable with ``docker compose --profile proxy up`` for full local
    # dev / mTLS tests — it pulls in the control-plane stack via the
    # ``depends_on`` below.
    profiles: ["proxy"]
    image: nginx:1.27-alpine
    container_name: helix-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Blue/green upstream (Stream I.2) — tools/deploy/deploy.py rewrites
      # the include file on the host; ``nginx -s reload`` re-reads it.
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./dev-certs:/etc/nginx/certs:ro
    ports:
      - "8080:8080"   # plain HTTP — healthz / metrics passthrough
      - "8443:8443"   # mTLS — service-to-service
    # nginx resolves the ``upstream`` server names once at config load
    # and caches the IPs. Starting it after both colours are healthy
    # means it caches their final, correct addresses (Stream I.2);
    # deploy.py's ``nginx -s reload`` re-resolves after a recreate.
    depends_on:
      control-plane-blue:
        condition: service_healthy
      control-plane-green:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8080 || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 20

  keycloak:
    # Keycloak IdP — Stream C.1 (per ADR-0003 § 2.1).
    # ``start-dev`` boots a single-instance Keycloak with the H2 storage
    # bootstrapped from the imported realm. Credentials below are dev-only
    # placeholders; prod overrides via env / secret manager.
    #
    # Behind the ``auth`` compose profile: data-layer integration tests
    # don't need an IdP and pulling the Keycloak image adds ~30s to CI.
    # Enable with ``docker compose --profile auth up`` for OIDC dev.
    profiles: ["auth"]
    image: quay.io/keycloak/keycloak:25.0
    container_name: helix-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${HELIX_KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${HELIX_KEYCLOAK_ADMIN_PASSWORD:-admin_dev}
      # Hostname matches the issuer the control plane validates against
      # (``HELIX_AGENT_OIDC_ISSUER`` in ``environments/dev.yaml``).
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/realm-helix-agent.json:/opt/keycloak/data/import/realm-helix-agent.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 5s
      timeout: 4s
      retries: 30

  credential-proxy:
    # Helix Credential Proxy — Stream F.5 service, containerised in F.10.
    # Dual-homed (Mini-ADR F-2 / F-14): on ``helix-sandbox-egress``
    # (--internal, sandbox-facing) so sandboxes can reach it, and on the
    # default network for outbound egress to real upstreams + Postgres.
    #
    # In the ``sandbox`` profile (standalone) and the ``full`` profile
    # (whole M0 app stack — Stream I.1 / Mini-ADR I-3).
    profiles: ["sandbox", "full"]
    build:
      context: ..
      dockerfile: services/credential-proxy/Dockerfile
    container_name: helix-credential-proxy
    environment:
      HELIX_CRED_PROXY_DB_DSN: postgresql+asyncpg://${HELIX_DB_USER:-helix_agent}:${HELIX_DB_PASSWORD:-helix_agent_dev}@postgres:5432/${HELIX_DB_NAME:-helix_agent_dev}
      HELIX_CRED_PROXY_SECRET_STORE_BACKEND: local_dev
      # Dev fixture secrets for the local_dev SecretStore (Stream I.1b) —
      # the #60 egress e2e resolves ``e2e-upstream-token`` from this file.
      HELIX_CRED_PROXY_SECRET_STORE_ENV_FILE: /run/secrets/proxy-secrets.env
    volumes:
      - ./credential-proxy/secrets.env:/run/secrets/proxy-secrets.env:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helix-sandbox-egress
      - default
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(s.connect_ex(('127.0.0.1',8080)))\""]
      interval: 3s
      timeout: 3s
      retries: 20

  # ----------------------------------------------------------------------
  # M0 helix application stack — Stream I.1 (Mini-ADR I-1/I-2/I-3).
  #
  # All three services below + credential-proxy are in the ``full`` profile.
  # ``docker compose --profile full up`` brings up the complete M0 stack
  # (data layer is always-on, no profile). Profile cheat-sheet:
  #   (default)        data layer only — postgres / pgbouncer / redis / minio
  #   --profile proxy  + nginx mTLS terminator
  #   --profile auth   + Keycloak IdP
  #   --profile sandbox + credential-proxy (standalone)
  #   --profile full   + migrate / control-plane-blue+green / sandbox-supervisor / credential-proxy
  #   --profile e2e    + mock-upstream (only — the #60 egress e2e names the
  #                      services it needs explicitly; see test_fullstack_egress_e2e.py)
  #   --profile observability + OTel Collector / Prometheus / Tempo / Loki /
  #                      Promtail / Grafana / Alertmanager (Stream G.0)
  #
  # Prerequisite for ``exec_python`` to work end-to-end: the sandbox
  # execution image must be pre-built on the host daemon (it is launched
  # by sandbox-supervisor at runtime, not a compose service):
  #   docker build -f infra/sandbox-image/Dockerfile -t helix-sandbox:dev infra/sandbox-image
  # ----------------------------------------------------------------------

  migrate:
    # One-shot schema migration — runs ``alembic upgrade head`` then exits.
    # Reuses the control-plane image (Mini-ADR I-3): it carries the Alembic
    # config + migrations dir. control-plane / sandbox-supervisor gate on
    # this completing so no service ever sees a half-built schema.
    #
    # No ``build:`` here on purpose — ``control-plane-blue`` is the sole
    # builder of the ``helix-control-plane`` tag; a second build of the
    # same tag races on image export. ``migrate`` just consumes it.
    profiles: ["full"]
    image: helix-control-plane:${HELIX_CONTROL_PLANE_TAG:-dev}
    container_name: helix-migrate
    restart: "no"
    # Direct Postgres (5432), not PgBouncer — DDL wants a direct connection.
    entrypoint: ["alembic", "-c", "/app/alembic/alembic.ini", "upgrade", "head"]
    environment:
      HELIX_AGENT_DB_URL: postgresql+psycopg://${HELIX_DB_USER:-helix_agent}:${HELIX_DB_PASSWORD:-helix_agent_dev}@postgres:5432/${HELIX_DB_NAME:-helix_agent_dev}
    depends_on:
      postgres:
        condition: service_healthy

  control-plane-blue:
    # Helix Control Plane — Stream B FastAPI surface; runs the orchestrator
    # in-process as a library (STREAM-E-DESIGN § 2.6 / Mini-ADR I-1).
    #
    # Blue/green pair (Stream I.2 / Mini-ADR I-4): both colours run under
    # the ``full`` profile; tools/deploy/deploy.py recreates the idle
    # colour with a new image tag and flips the nginx upstream. ``build``
    # lives only on blue — green and ``migrate`` reuse the same tag
    # (avoids a double-build race, as Mini-ADR I-3 does for migrate).
    <<: *control-plane-base
    container_name: helix-control-plane-blue
    build:
      context: ..
      dockerfile: services/control-plane/Dockerfile
    ports:
      - "8000:8000"

  control-plane-green:
    # Idle/standby colour by default — see control-plane-blue above.
    <<: *control-plane-base
    container_name: helix-control-plane-green
    ports:
      - "8001:8000"

  sandbox-supervisor:
    # Helix Sandbox Supervisor — Stream F.1 service. Docker-out-of-docker
    # (Mini-ADR I-2): the mounted host docker.sock lets it launch sandbox
    # sibling containers on the host daemon. Runs as root for socket
    # access — the socket mount is the real trust boundary.
    profiles: ["full"]
    build:
      context: ..
      dockerfile: services/sandbox-supervisor/Dockerfile
    image: helix-sandbox-supervisor
    container_name: helix-sandbox-supervisor
    user: root
    # Host port for dev introspection + the #60 e2e (driver runs on the host).
    ports:
      - "8001:8000"
    environment:
      # Direct Postgres (5432) — the supervisor issues plain inserts /
      # updates with no need for the PgBouncer pool.
      HELIX_SANDBOX_DB_DSN: postgresql+asyncpg://${HELIX_DB_USER:-helix_agent}:${HELIX_DB_PASSWORD:-helix_agent_dev}@postgres:5432/${HELIX_DB_NAME:-helix_agent_dev}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(s.connect_ex(('127.0.0.1',8000)))\""]
      interval: 3s
      timeout: 3s
      retries: 20

  mock-upstream:
    # Mock upstream for the #60 full-stack egress e2e (Stream I.1b).
    # A stdlib HTTP echo server — the credential-proxy forwards requests
    # here and the echoed response proves the secret was injected. On the
    # default network only (not helix-sandbox-egress): a sandbox must not
    # reach it directly, only via the proxy. ``e2e`` profile — started
    # only when the e2e test explicitly names it.
    profiles: ["e2e"]
    image: python:3.12-alpine
    container_name: helix-mock-upstream
    command: ["python", "/app/echo_server.py"]
    volumes:
      - ./mock-upstream/echo_server.py:/app/echo_server.py:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(s.connect_ex(('127.0.0.1',9100)))\""]
      interval: 3s
      timeout: 3s
      retries: 20

  # ----------------------------------------------------------------------
  # Observability backend stack — Stream G.0 (Mini-ADR G-2).
  #
  # Self-hosted OTel Collector + Prometheus + Tempo + Loki + Promtail +
  # Grafana + Alertmanager. Behind the ``observability`` profile — the
  # default ``up`` and the app profiles don't pull it. Enable with
  # ``docker compose --profile observability up``; add ``--profile full``
  # to also run the helix services it observes.
  # ----------------------------------------------------------------------

  otel-collector:
    # Receives OTLP from the helix services (A.8) → forwards traces to Tempo.
    # Core distro is enough — the pipeline uses only otlp receiver/exporter.
    profiles: ["observability"]
    image: otel/opentelemetry-collector:0.119.0
    container_name: helix-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    depends_on:
      - tempo

  prometheus:
    # Scrapes the helix services' /metrics; evaluates rules from
    # tools/observability/rules/ (filled by G.1 / G.2).
    profiles: ["observability"]
    image: prom/prometheus:v3.1.0
    container_name: helix-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../tools/observability/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  tempo:
    # Trace store — receives OTLP from the collector. ``user: root`` so it
    # can write the named volume (fresh volume is root-owned).
    profiles: ["observability"]
    image: grafana/tempo:2.7.0
    container_name: helix-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    user: root
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo

  loki:
    # Log store — receives the helix services' stdout JSON from Promtail.
    profiles: ["observability"]
    image: grafana/loki:3.3.0
    container_name: helix-loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    user: root
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki

  promtail:
    # Loki's log agent — discovers containers via the Docker socket.
    profiles: ["observability"]
    image: grafana/promtail:3.3.0
    container_name: helix-promtail
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    # Unified view — Prometheus / Tempo / Loki datasources auto-provisioned.
    profiles: ["observability"]
    image: grafana/grafana:11.4.0
    container_name: helix-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${HELIX_GRAFANA_ADMIN_PASSWORD:-helix_agent_dev}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../tools/observability/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

  alertmanager:
    # Alert routing — minimal config in G.0; P0/P1/P2 routing lands in G.2.
    profiles: ["observability"]
    image: prom/alertmanager:v0.28.0
    container_name: helix-alertmanager
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

volumes:
  postgres-data:
  minio-data:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:

networks:
  # Sandbox egress network — created --internal (Mini-ADR F-14): no NAT /
  # default route, so a sandbox attached to it can reach only same-network
  # peers (the credential-proxy). Sandboxes join it by name at docker-run
  # time (SandboxRuntimeProvider). Explicit ``name`` keeps it un-prefixed.
  helix-sandbox-egress:
    name: helix-sandbox-egress
    internal: true
