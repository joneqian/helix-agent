repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # helm templates carry Go ``{{ }}`` and the HA-failover compose overlay
        # uses docker-compose's ``!override`` merge tag — both are valid for their
        # tooling but PyYAML's safe_load (check-yaml) can't parse them.
        exclude: ^(deploy/k8s/.*helm.*\.yaml|infra/docker-compose\.ha-e2e\.yml)$
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']
