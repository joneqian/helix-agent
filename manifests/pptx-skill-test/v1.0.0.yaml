# Live auto-mount test agent — skill-runtime §5.1 (PRs #736/#737).
#
# Binds the platform `pptx` skill + the `bash` tool in the office sandbox so
# tools/eval/verify_live_skill_runtime.py can prove the skill's files are
# materialized at /workspace/skills/pptx/ on a real sandbox acquire.
#
# Before registering: the `pptx` platform skill must be ACTIVE (imported skills
# start as DRAFT) — the verify script's `--setup` flips it for you.
#
# MODEL: defaults to anthropic. EDIT the model block to whatever provider you
# pasted a key for in /settings/platform (deepseek / qwen / glm …) and set the
# matching `sandbox.network.allowlist` host.
apiVersion: helix.io/v1
kind: Agent
metadata:
  name: pptx-skill-test
  version: "1.0.0"
  tenant: canonical
spec:
  description: >-
    Live auto-mount test agent: binds the platform pptx skill + bash in the
    office sandbox to prove /workspace/skills/pptx/ is seeded on acquire.

  model:
    provider: anthropic # ← change to your configured provider
    name: claude-sonnet-4-5 # ← and its model name
    temperature: 0.2
    max_tokens: 4096

  system_prompt:
    template: |
      You are a test agent. When asked, use the bash tool to run the exact
      command given and report its full output verbatim. The pptx skill's
      bundled files are on disk under /workspace/skills/pptx/.

  tools:
    - { type: builtin, name: exec_python }
    - { type: builtin, name: bash }

  skills:
    - pptx

  sandbox:
    runtime: gvisor
    image_variant: office # pptx scripts need pandas/Pillow → office image
    resources:
      cpu: "1.0"
      memory: 1Gi
    network:
      egress: proxy
      allowlist:
        - api.anthropic.com # ← change to your model's API host
    filesystem:
      readonly_root: true
      writable:
        - /tmp
      persistent_workspace: true

  observability:
    log_level: info
