[project]
name = "helix-agent-common"
version = "0.0.0"
description = "Helix-Agent shared utilities: logging, telemetry, errors, version"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [
    { name = "joneqian", email = "qian.qing0926@gmail.com" },
]
dependencies = [
    # Stream A.8 — OTel SDK + W3C Trace Context.
    # The API + SDK split lets call sites depend on the stable API without
    # pulling the gRPC exporter; init_tracing() lazy-imports the OTLP path.
    "opentelemetry-api>=1.27,<2",
    "opentelemetry-sdk>=1.27,<2",
    "opentelemetry-exporter-otlp-proto-http>=1.27,<2",
    # Stream A.9 — Prometheus metrics. Pure-Python client; the /metrics
    # exposition handler stays HTTP-framework-agnostic so Control Plane
    # (Stream B / FastAPI) can mount it however it likes.
    "prometheus-client>=0.21,<1",
    # Stream C.2 — service-to-service HTTP with mTLS (internal_http).
    "httpx>=0.27,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helix_agent"]
