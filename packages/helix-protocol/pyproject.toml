[project]
name = "helix-agent-protocol"
version = "0.0.0"
description = "Helix-Agent cross-service schemas (Pydantic): event_log, audit_log, thread_meta, agent_spec, session events"
readme = "README.md"
requires-python = ">=3.12"
license = "AGPL-3.0-only"
authors = [
    { name = "joneqian", email = "qian.qing0926@gmail.com" },
]
dependencies = [
    "pydantic>=2.7,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helix_agent"]
