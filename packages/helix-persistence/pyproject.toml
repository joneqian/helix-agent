[project]
name = "helix-agent-persistence"
version = "0.0.0"
description = "Helix-Agent SQLAlchemy ORM models + Alembic migrations for event_log / thread_meta / audit_log"
readme = "README.md"
requires-python = ">=3.12"
license = "AGPL-3.0-only"
authors = [
    { name = "joneqian", email = "qian.qing0926@gmail.com" },
]
dependencies = [
    "helix-agent-protocol",
    "sqlalchemy[asyncio]>=2.0.30,<3",
    "asyncpg>=0.30,<1",
    "alembic>=1.13,<2",
    "psycopg[binary]>=3.2,<4",
    "pgvector>=0.3,<1",
    "jieba>=0.42,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helix_agent"]
