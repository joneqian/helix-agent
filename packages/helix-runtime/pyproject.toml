[project]
name = "helix-agent-runtime"
version = "0.0.0"
description = "Helix-Agent runtime infrastructure (event store, persistence factories, checkpointers) — vendored from bytedance/deer-flow"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [
    { name = "joneqian", email = "qian.qing0926@gmail.com" },
]
dependencies = [
    "helix-agent-persistence",
    "helix-agent-protocol",
    "sqlalchemy[asyncio]>=2.0.30,<3",
    # Pin past CVE-2026-28277 (langgraph) + CVE-2025-64439 / 2026-27794 (langgraph-checkpoint).
    # langgraph-checkpoint is transitive but pinned directly so pip-audit + CI catch any regression.
    "langgraph>=1.0.10",
    "langgraph-checkpoint>=4.0.0",
    "langgraph-checkpoint-postgres>=2.0.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helix_agent"]
