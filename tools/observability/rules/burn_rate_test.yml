# promtool unit tests for burn_rate.yml — Stream 10.5.
# Run: promtool test rules tools/observability/rules/burn_rate_test.yml
#
# Drives synthetic control-plane request counters and asserts the recorded
# error-budget burn rate + the multi-window alert firing logic.

rule_files:
  - burn_rate.yml

evaluation_interval: 1m

tests:
  # 5% sustained 5xx → burn rate = 0.05 / 0.001 = 50× → fast-burn P0 fires.
  - interval: 1m
    name: fast burn fires P0 at 5% error rate
    input_series:
      - series: 'helix_control_plane_http_requests_total{status_code="200"}'
        values: "0+95x90"
      - series: 'helix_control_plane_http_requests_total{status_code="500"}'
        values: "0+5x90"
    promql_expr_test:
      - expr: helix_slo_burn_rate{slo="control_plane_availability",window="1h"}
        eval_time: 70m
        exp_samples:
          - labels: 'helix_slo_burn_rate{slo="control_plane_availability",window="1h"}'
            value: 50
    alert_rule_test:
      - eval_time: 70m
        alertname: HelixSLOAvailabilityFastBurn
        exp_alerts:
          - exp_labels:
              severity: P0
              slo: control_plane_availability
              window: "1h"
            exp_annotations:
              summary: "Control-plane availability error budget burning fast (P0)"
              description: >-
                1h burn rate 50.0× (and 5m window confirms); the 30d error
                budget for 99.9% availability empties in <2 days at this rate.
                Page on-call.

  # All-200 traffic → no 5xx series → burn rate is the empty vector (not 0),
  # so no alert. (``sum(rate(5xx))`` over zero matching series is empty, and
  # ``empty / total`` stays empty — correct: "no errors" is absence, not 0.)
  - interval: 1m
    name: healthy traffic raises no burn alert
    input_series:
      - series: 'helix_control_plane_http_requests_total{status_code="200"}'
        values: "0+100x90"
    promql_expr_test:
      - expr: helix_slo_burn_rate{slo="control_plane_availability",window="1h"}
        eval_time: 70m
        exp_samples: []
    alert_rule_test:
      - eval_time: 70m
        alertname: HelixSLOAvailabilityFastBurn
        exp_alerts: []
