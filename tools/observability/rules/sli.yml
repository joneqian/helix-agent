# Helix SLI recording rules — Stream G.1.
#
# Pre-aggregates the SLIs for the SLOs defined in docs/runbooks/slo.md.
# Loaded by Prometheus from /etc/prometheus/rules/ (G.0 mount).
#
# Only the two SLIs whose metric is emitted in M0 are recorded here;
# TTFT / sandbox-cold-start / durable-resume rules land when their
# metrics are emitted (slo.md SLO #3-#5). Burn-rate rules are M1.

groups:
  - name: helix_sli
    interval: 30s
    rules:
      # SLO 1 — control-plane API availability: 5m non-5xx success ratio.
      # 0/0 (no traffic) records as NaN — acceptable for M0.
      - record: helix:sli:control_plane_availability:ratio5m
        expr: |
          sum(rate(helix_control_plane_http_requests_total{status_code!~"5.."}[5m]))
          /
          sum(rate(helix_control_plane_http_requests_total[5m]))

      # SLO 2 — control-plane API P99 latency (seconds; target < 0.2).
      - record: helix:sli:control_plane_http_latency:p99_5m
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(helix_control_plane_http_request_duration_seconds_bucket[5m]))
          )

      # SLO 3 — Session TTFT P95 (seconds; target < 1.5). Stream K.K10
      # added the histogram in the orchestrator SSE worker — observed
      # at the first agent ``updates`` chunk after ``RUNNING``.
      - record: helix:sli:session_ttft:p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(helix_session_ttft_seconds_bucket[5m]))
          )

      # SLO 4 — Sandbox cold-start P95 (seconds; target < 3 in M0, < 0.5 in M1).
      # Stream K.K10 added the histogram in sandbox-supervisor.acquire,
      # observed only on the cold-launch path (warm-session reuse skips it).
      - record: helix:sli:sandbox_cold_start:p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(helix_sandbox_cold_start_seconds_bucket[5m]))
          )

      # SLO 5 — Durable resume P95 (seconds). Stream K.K10 added the
      # histogram, observed at the first chunk of a run that resumed an
      # existing checkpointed thread (control-plane sets
      # ``RunRecord.is_resume`` from prior-runs lookup).
      - record: helix:sli:durable_resume:p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(helix_durable_resume_seconds_bucket[5m]))
          )

      # SLO 7 — Session end-to-end P95 for successful runs (seconds;
      # Stream M Gate target < 30). Filtered to outcome="success" so
      # error / max_steps / cancelled tails do not bias the user-facing
      # latency view (the labelled histogram in orchestrator.sse).
      - record: helix:sli:session_duration:p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(helix_session_duration_seconds_bucket{outcome="success"}[5m]))
          )
