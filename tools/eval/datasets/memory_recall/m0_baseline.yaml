# J.3 memory recall — M0 baseline dataset (Stream J.13a).
#
# 32 cases extending the 8-case K12 seed (zh_en_seed.yaml) with two more
# axes:
#   - language: zh + en (8 each)
#   - kind:     fact + episodic (8 each per language)
#
# Layout (8 each, total 32):
#   zh fact     (zhf-001 .. zhf-008)
#   en fact     (enf-001 .. enf-008)
#   zh episodic (zhe-001 .. zhe-008)
#   en episodic (ene-001 .. ene-008)
#
# Threshold against the deterministic FakeKeywordEmbedder
# (tools/eval/run_baseline.py) is recall@5 ≥ 0.70 / mrr@5 ≥ 0.55
# (Mini-ADR J-37; see STREAM-J-DESIGN § 18.3).

name: memory_recall-m0-baseline

cases:
  # ---------- zh fact (8) ----------
  - id: zhf-001
    language: zh
    query: 我喜欢喝咖啡
    memories:
      - id: m1
        content: 用户偏好咖啡而不是茶
        kind: fact
      - id: m2
        content: 用户家有一只猫
        kind: fact
    expected_recall_ids: [m1]

  - id: zhf-002
    language: zh
    query: 用户的工作领域
    memories:
      - id: m1
        content: 用户是一名后端工程师
        kind: fact
      - id: m2
        content: 用户喜欢周末去爬山
        kind: fact
    expected_recall_ids: [m1]

  - id: zhf-003
    language: zh
    query: 用户对部署偏好的回答
    memories:
      - id: m1
        content: 用户偏好 docker compose 而不是 K8s
        kind: fact
      - id: m2
        content: 用户喜欢用 vim 写代码
        kind: fact
    expected_recall_ids: [m1]

  - id: zhf-004
    language: zh
    query: 用户喜欢的编辑器
    memories:
      - id: m1
        content: 用户用 vim 作为主要编辑器
        kind: fact
      - id: m2
        content: 用户家里有两只猫
        kind: fact
    expected_recall_ids: [m1]

  - id: zhf-005
    language: zh
