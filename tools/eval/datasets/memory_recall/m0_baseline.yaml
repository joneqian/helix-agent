    expected_recall_ids: [m1]

  - id: zhf-006
    language: zh
    query: 用户偏好的数据库
    memories:
      - id: m1
        content: 用户长期使用 PostgreSQL 数据库
        kind: fact
      - id: m2
        content: 用户偏好 Python 编程语言
